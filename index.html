        const App = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [lowStockOnly, setLowStockOnly] = useState(false);
            const [threshold, setThreshold] = useState(40);
            const [sortDirection, setSortDirection] = useState(null);
            const [sortBy, setSortBy] = useState('total');
            const [usageView, setUsageView] = useState('total'); // 'total', 'average', 'monthly'
            
            // Ref for PDF Export
            const printRef = useRef(null);
            const [isExporting, setIsExporting] = useState(false);

            // Helper: Style for Color Codes
            const getColorCodeStyle = (value) => {
                if (!isFinite(value)) return 'bg-slate-100 text-slate-500 border-slate-200';
                if (value < 0.75) return 'bg-red-50 text-red-700 border-red-200 ring-1 ring-red-600/20'; // สั่งเพิ่ม
                if (value < 1.25) return 'bg-amber-50 text-amber-700 border-amber-200 ring-1 ring-amber-600/20'; // เฝ้าระวัง
                return 'bg-emerald-50 text-emerald-700 border-emerald-200 ring-1 ring-emerald-600/20'; // ปกติ
            };

            // Sort Handler
            const handleSort = (key) => {
                if (sortBy === key) {
                    setSortDirection(current => {
                        if (current === null) return 'asc';
                        if (current === 'asc') return 'desc';
                        return null;
                    });
                } else {
                    setSortBy(key);
                    setSortDirection('desc');
                }
            };

            // Data Processing
            const processedData = useMemo(() => {
                let data = INITIAL_DATA.map(item => {
                    const total = item.warehouse + item.ready + item.defect + item.floating;
                    const usage6m = item.history.reduce((sum, val) => sum + val, 0);
                    const avgMonthly = usage6m / 6;
                    
                    const aging = avgMonthly > 0 ? total / avgMonthly : Infinity;
                    const code = item.leadTime > 0 ? aging / item.leadTime : 0;

                    const avgMonthly50 = avgMonthly * 1.5;
                    const aging50 = avgMonthly50 > 0 ? total / avgMonthly50 : Infinity;
                    const code50 = item.leadTime > 0 ? aging50 / item.leadTime : 0;

                    return { ...item, total, usage6m, avgMonthly, aging, code, avgMonthly50, aging50, code50 };
                }).filter(item => {
                    const matchesSearch = item.model.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesLowStock = lowStockOnly ? item.total < threshold : true;
                    return matchesSearch && matchesLowStock;
                });

                if (sortDirection) {
                    data.sort((a, b) => {
                        let valA = a[sortBy]; let valB = b[sortBy];
                        if (!isFinite(valA)) valA = -1; 
                        if (!isFinite(valB)) valB = -1;
                        return sortDirection === 'asc' ? valA - valB : valB - valA;
                    });
                }
                return data;
            }, [searchTerm, lowStockOnly, threshold, sortDirection, sortBy]);

            // Stats
            const stats = useMemo(() => {
                const totalItems = processedData.length;
                const lowStockCount = processedData.filter(item => item.total > 0 && item.total < threshold).length;
                const outOfStockCount = processedData.filter(item => item.total === 0).length;
                return { totalItems, lowStockCount, outOfStockCount };
            }, [processedData, threshold]);

            // PDF Export Function
            const handleExportPDF = async () => {
                if (!printRef.current || isExporting) return;
                
                setIsExporting(true);
                
                try {
                    const element = printRef.current;
                    const tableContainer = element.querySelector('.table-container');
                    
                    // 1. Pre-capture setup: Ensure table container doesn't hide overflow
                    let originalOverflow = '';
                    if (tableContainer) {
                        originalOverflow = tableContainer.style.overflowX;
                        tableContainer.style.overflowX = 'visible';
                        // Force width to fit content so html2canvas renders the whole table
                        element.style.width = 'max-content';
                        element.style.padding = '20px'; // Add some padding for the PDF edges
                    }

                    // Small delay to allow browser to apply styles before capturing
                    await new Promise(resolve => setTimeout(resolve, 100));

                    // 2. Capture canvas
                    const canvas = await html2canvas(element, {
                        scale: 1.5, // Balance between detail and file size
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#f8fafc' // match bg-slate-50
                    });

                    // 3. Post-capture cleanup: Restore styles
                    if (tableContainer) {
                        tableContainer.style.overflowX = originalOverflow;
                        element.style.width = '';
                        element.style.padding = '';
                    }

                    // 4. Generate PDF
                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    const { jsPDF } = window.jspdf;
                    
                    // Use A4 Landscape
                    const pdf = new jsPDF({
                        orientation: 'landscape',
                        unit: 'mm',
                        format: 'a4'
                    });

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    // Calculate height to maintain aspect ratio
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    
                    // Format date for filename
                    const dateObj = new Date();
                    const dateStr = `${dateObj.getDate()}-${dateObj.getMonth()+1}-${dateObj.getFullYear()}`;
                    
                    pdf.save(`Stock_Report_${dateStr}.pdf`);

                } catch (error) {
                    console.error("PDF Export failed:", error);
                    alert("ขออภัย เกิดข้อผิดพลาดในการสร้างไฟล์ PDF");
                } finally {
                    setIsExporting(false);
                }
            };

                                                                {isFinite(item.aging) ? item.aging.toFixed(1) : '-'}
                                                            </td>
                                                            <td className="py-2.5 sm:py-3 px-1 sm:px-3 text-center border-r border-slate-200/60 bg-slate-50/40">
                                                                <div className={`mx-auto inline-flex items-center justify-center min-w-[3rem] sm:min-w-[3.5rem] py-0.5 sm:py-1 px-1.5 sm:px-2 rounded font-bold text-[10px] sm:text-xs font-eng border ${getColorCodeStyle(item.code)}`}>
                                                                    {isFinite(item.code) ? item.code.toFixed(2) : '-'}
                                                                </div>
                                                            </td>

                                                            {/* +50% Scenario Data */}
                                                            <td className="py-2.5 sm:py-3 px-2 sm:px-3 text-center text-fuchsia-700/80 font-eng tabular-nums bg-fuchsia-50/30">
                                                                {item.avgMonthly50 > 0 ? item.avgMonthly50.toFixed(1) : '-'}
                                                            </td>
                                                            <td className="py-2.5 sm:py-3 px-2 sm:px-3 text-center text-fuchsia-700/80 font-eng tabular-nums bg-fuchsia-50/30">
                                                                {isFinite(item.aging50) ? item.aging50.toFixed(1) : '-'}
                                                            </td>
                                                            <td className="py-2.5 sm:py-3 px-1 sm:px-3 text-center bg-fuchsia-50/30">
                                                                <div className={`mx-auto inline-flex items-center justify-center min-w-[3rem] sm:min-w-[3.5rem] py-0.5 sm:py-1 px-1.5 sm:px-2 rounded font-bold text-[10px] sm:text-xs font-eng border ${getColorCodeStyle(item.code50)}`}>
                                                                    {isFinite(item.code50) ? item.code50.toFixed(2) : '-'}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })
                                            ) : (
                                                <tr>
                                                    <td colSpan="20" className="p-10 sm:p-16 text-center">
                                                        <div className="flex flex-col items-center justify-center gap-2 sm:gap-3 text-slate-400">
                                                            <div className="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-slate-100 flex items-center justify-center mb-1 sm:mb-2">
                                                                <Search className="w-6 h-6 sm:w-8 sm:h-8 opacity-40" />
                                                            </div>
                                                            <p className="text-base sm:text-lg font-medium text-slate-500">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</p>
                                                            <p className="text-xs sm:text-sm">ลองเปลี่ยนคำค้นหา หรือปิดตัวกรองสินค้าใกล้หมด</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                
                                {/* Table Footer (Included in PDF) */}
                                <div className="bg-slate-50/90 border-t border-slate-200/60 p-3 sm:p-4 px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4 text-[10px] sm:text-xs font-medium text-slate-500">
                                    <div className="flex flex-wrap justify-center items-center gap-3 sm:gap-4">
                                        <span className="flex items-center gap-1 sm:gap-1.5"><div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-[3px] bg-red-50 border border-red-300"></div> ต้องสั่งเพิ่ม (&lt; 0.75)</span>
                                        <span className="flex items-center gap-1 sm:gap-1.5"><div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-[3px] bg-amber-50 border border-amber-300"></div> เฝ้าระวัง (0.75 - 1.24)</span>
                                        <span className="flex items-center gap-1 sm:gap-1.5"><div className="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-[3px] bg-emerald-50 border border-emerald-300"></div> ปกติ (≥ 1.25)</span>
                                    </div>
                                    <div className="text-center sm:text-right">
                                        แสดงข้อมูล <strong className="text-slate-700 font-eng">{processedData.length}</strong> จาก <span className="font-eng">{INITIAL_DATA.length}</span> รายการ
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
