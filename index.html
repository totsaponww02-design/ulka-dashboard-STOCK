                setData([newItem, ...data]);
                setNewProductName('');
                setShowAddModal(false);
            };

            const handleAddNewMonth = () => {
                if (!newMonthName.trim()) return;
                
                // จำกัดให้เก็บข้อมูลแค่ 6 เดือนล่าสุด
                setMonthLabels([newMonthName, ...monthLabels].slice(0, 6));
                setData(prev => prev.map(item => ({ 
                    ...item, 
                    history: [0, ...item.history].slice(0, 6) 
                })));
                
                setNewMonthName('');
                setShowAddMonthModal(false);
            };

            const removeProduct = (id) => {
                setData(prev => prev.filter(item => item.id !== id));
                setEditingProduct(null);
            };

            const toggleDiscontinued = (id) => {
                setData(prev => prev.map(item => item.id === id ? { ...item, isDiscontinued: !item.isDiscontinued } : item));
                setEditingProduct(null);
            };

            const handleSaveEdit = () => {
                if (editingProduct) {
                    updateProductField(editingProduct.id, 'model', editingProduct.model);
                    setEditingProduct(null);
                }
            };

            // --- Calculations ---
            const processedData = useMemo(() => {
                return data.map(item => {
                    const total = (Number(item.warehouse) || 0) + (Number(item.ready) || 0) + (Number(item.defect) || 0) + (Number(item.floating) || 0);
                    const usageTotal = (item.history || []).reduce((a, b) => a + (Number(b) || 0), 0);
                    const avgNormal = monthLabels.length > 0 ? usageTotal / monthLabels.length : 0;
                    const aging = avgNormal > 0 ? total / avgNormal : (total > 0 ? 99 : 0);
                    const code = item.leadTime > 0 ? aging / item.leadTime : 0;
                    
                    const avg50 = avgNormal * 1.5;
                    const aging50 = avg50 > 0 ? total / avg50 : (total > 0 ? 99 : 0);
                    const code50 = item.leadTime > 0 ? aging50 / item.leadTime : 0;

                    return { ...item, total, usageTotal, avgNormal, aging, code, avg50, aging50, code50 };
                });
            }, [data, monthLabels]);

            const filteredData = useMemo(() => {
                return processedData.filter(item => {
                    const matchSearch = item.model.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchLow = lowStockOnly ? item.total < threshold : true;
                    const matchDiscontinued = activeTab === 'report' ? !item.isDiscontinued : true; 
                    return matchSearch && matchLow && matchDiscontinued;
                });
            }, [processedData, searchTerm, lowStockOnly, threshold, activeTab]);

            const stats = useMemo(() => ({
                total: processedData.filter(i => !i.isDiscontinued).length,
                low: processedData.filter(i => !i.isDiscontinued && i.total > 0 && i.total < threshold).length,
                out: processedData.filter(i => !i.isDiscontinued && i.total === 0).length

                    pdf.save(`Stock_Report_Export.pdf`);

                                        <div className="flex bg-slate-100 p-1.5 rounded-xl gap-1">

                                                { id: 'monthly', label: 'รายเดือน' }
                                            ].map(v => (
                                                <button key={v.id} onClick={() => setUsageView(v.id)} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${usageView === v.id ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-800'}`}>
                                                    {v.label}

                                            {isExporting ? <Loader2 className="w-4 h-4" /> : <Download className="w-4 h-4" />} PDF

                                <div ref={printRef} className="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden">

                                                    {activeItems.map((item, idx) => (
                                                        <tr key={item.id} className="hover:bg-slate-50 transition-colors group text-sm font-bold">
                                                            <td className="py-3 px-3 sticky left-0 bg-white group-hover:bg-slate-50 z-10 text-center text-slate-300">{idx + 1}</td>
                                                            <td className="py-3 px-6 sticky left-12 bg-white group-hover:bg-slate-50 z-10 border-r shadow-[2px_0_5px_rgba(0,0,0,0.02)] relative group/item">
                                                                <div className="flex items-center justify-between gap-4">
                                                                    <span className="font-extrabold text-slate-800 truncate">{item.model}</span>
                                                                    <button onClick={() => setEditingProduct({...item})} className="hidden group-hover/item:flex p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition-all shadow-sm font-eng"><Pencil className="w-3.5 h-3.5" /></button>
                                                                </div>
                                                            </td>
                                                            <td className="py-3 px-1"><input type="number" value={item.warehouse} onChange={(e) => updateProductField(item.id, 'warehouse', e.target.value)} className="w-full text-center bg-white border border-slate-100 rounded-lg py-1 text-slate-500" /></td>
                                                            <td className="py-3 px-1"><input type="number" value={item.ready} onChange={(e) => updateProductField(item.id, 'ready', e.target.value)} className="w-full text-center bg-white border border-slate-100 rounded-lg py-1 text-slate-500" /></td>
                                                            <td className="py-3 px-1"><input type="number" value={item.defect} onChange={(e) => updateProductField(item.id, 'defect', e.target.value)} className="w-full text-center bg-white border border-slate-100 rounded-lg py-1 text-orange-500" /></td>
                                                            <td className="py-3 px-1 border-r"><input type="number" value={item.floating} onChange={(e) => updateProductField(item.id, 'floating', e.target.value)} className="w-full text-center bg-white border border-slate-100 rounded-lg py-1 text-indigo-500" /></td>
                                                            {item.history.map((val, hIdx) => (
                                                                <td key={hIdx} className="py-3 px-1 border-l"><input type="number" value={val} onChange={(e) => updateHistoryField(item.id, hIdx, e.target.value)} className="w-full text-center bg-slate-50 border border-slate-200 rounded-lg py-1.5 text-indigo-700" /></td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                                {/* Discontinued Section */}
                                {discontinuedItems.length > 0 && (
                                    <div className="space-y-4 pt-10 border-t-2 border-dashed border-slate-200 opacity-60">
                                        <h2 className="text-sm font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">🛑 ยกเลิกจำหน่าย (เก็บประวัติ)</h2>
                                        <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden">
                                            <div className="overflow-x-auto custom-scrollbar table-container">
                                                <table className="w-full text-left border-collapse min-w-[1400px]">
                                                    <tbody className="divide-y divide-slate-100">
                                                        {discontinuedItems.map((item, idx) => (
                                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors group">
                                                                <td className="py-3 px-6 sticky left-0 bg-white group-hover:bg-slate-50 z-10 border-r w-12 text-center text-slate-300 font-bold">{idx + 1}</td>
                                                                <td className="py-3 px-6 sticky left-12 bg-white group-hover:bg-slate-50 z-10 border-r min-w-[220px] relative group/item">
                                                                    <div className="flex items-center justify-between gap-4">
                                                                        <span className="font-bold text-slate-400 line-through truncate">{item.model}</span>
                                                                        <button onClick={() => setEditingProduct({...item})} className="hidden group-hover/item:flex p-2 bg-slate-100 text-slate-400 rounded-lg hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><Pencil className="w-3.5 h-3.5" /></button>
                                                                    </div>
                                                                </td>
                                                                <td className="py-3 px-1 text-center text-slate-300 font-eng">{item.warehouse}</td>
                                                                <td className="py-3 px-1 text-center text-slate-300 font-eng">{item.ready}</td>
                                                                <td className="py-3 px-1 text-center text-slate-200 font-eng">{item.defect}</td>
                                                                <td className="py-3 px-1 border-r text-center text-slate-200 font-eng">{item.floating}</td>
                                                                {item.history.map((val, hIdx) => (
                                                                    <td key={hIdx} className={`py-3 px-1 border-l text-center text-slate-400 font-eng`}>{val}</td>
                                                                ))}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
