                    const code = item.leadTime > 0 ? aging / item.leadTime : 0;

                    const aging50 = avgMonthly50 > 0 ? total / avgMonthly50 : Infinity;
                    const code50 = item.leadTime > 0 ? aging50 / item.leadTime : 0;

                                    placeholder="ค้นหารุ่นสินค้า..." 
                                    className="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-400 font-medium text-slate-700 font-eng"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>

                            {/* Right: Filters & Toggles */}
                            <div className="flex flex-wrap lg:flex-nowrap items-center gap-3 w-full xl:w-auto">
                                
                                {/* Threshold Input */}
                                <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg overflow-hidden h-11">
                                    <span className="px-3 text-sm font-medium text-slate-500 bg-slate-100 border-r border-slate-200 flex h-full items-center whitespace-nowrap">
                                        แจ้งเตือน &lt;
                                    </span>
                                    <input 
                                        type="number" 
                                        value={threshold}
                                        onChange={(e) => setThreshold(Number(e.target.value))}
                                        className="w-16 bg-transparent px-3 py-2 text-center font-bold text-indigo-700 outline-none tabular-nums font-eng"
                                    />
                                </div>

                                {/* Low Stock Toggle */}
                                <button 
                                    onClick={() => setLowStockOnly(!lowStockOnly)}
                                    className={`h-11 flex items-center justify-center gap-2 px-4 rounded-lg font-medium transition-all text-sm border focus:ring-4 whitespace-nowrap ${
                                        lowStockOnly 
                                        ? 'bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100 focus:ring-amber-500/20' 
                                        : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:text-slate-900 focus:ring-slate-500/10'
                                    }`}
                                >
                                    <AlertTriangle className={`w-4 h-4 ${lowStockOnly ? 'fill-current' : ''}`} />
                                    {lowStockOnly ? 'แสดงสินค้าทั้งหมด' : 'แสดงเฉพาะใกล้หมด'}
                                </button>

                                <div className="w-px h-8 bg-slate-200 hidden lg:block mx-1"></div>

                                {/* View Mode Toggle */}
                                <div className="flex items-center bg-slate-100/80 p-1 rounded-lg border border-slate-200 w-full lg:w-auto h-11">
                                    <button 
                                        onClick={() => setUsageView('total')} 
                                        className={`flex-1 lg:flex-none px-4 py-1.5 rounded-md text-sm font-semibold transition-all whitespace-nowrap ${usageView === 'total' ? 'bg-white shadow-sm text-indigo-700 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        รวม 6M
                                    </button>
                                    <button 
                                        onClick={() => setUsageView('average')} 
                                        className={`flex-1 lg:flex-none px-4 py-1.5 rounded-md text-sm font-semibold transition-all whitespace-nowrap ${usageView === 'average' ? 'bg-white shadow-sm text-indigo-700 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        เฉลี่ย/เดือน
                                    </button>
                                    <button 
                                        onClick={() => setUsageView('monthly')} 
                                        className={`flex-1 lg:flex-none px-4 py-1.5 rounded-md text-sm font-semibold transition-all whitespace-nowrap ${usageView === 'monthly' ? 'bg-white shadow-sm text-indigo-700 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        รายเดือน
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* --- DATA TABLE --- */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden relative z-0">
                            <div className="overflow-x-auto custom-scrollbar pb-2">
                                <table className="w-full text-left border-collapse min-w-[1200px]">
                                    <thead>
                                        <tr className="bg-slate-50/80 text-[11px] uppercase tracking-wider text-slate-500 border-b border-slate-200 font-semibold">
                                            {/* Sticky Columns */}
                                            <th className="py-4 px-3 text-center sticky left-0 z-20 bg-slate-50/95 backdrop-blur-sm w-12">No.</th>
                                            <th className="py-4 px-4 sticky left-12 z-20 bg-slate-50/95 backdrop-blur-sm min-w-[180px] shadow-[4px_0_12px_-4px_rgba(0,0,0,0.05)] border-r border-slate-200">
                                                Monitor Goods
                                            </th>
                                            
                                            {/* Stock Breakdown */}
                                            <th className="py-4 px-3 text-center text-slate-600">โกดัง</th>
                                            <th className="py-4 px-3 text-center text-slate-600">พร้อมขาย</th>
                                            <th className="py-4 px-3 text-center text-orange-600">ตำหนิ</th>
                                            <th className="py-4 px-3 text-center text-indigo-600 border-r border-slate-200">โมลลอย</th>
                                            
                                            {/* Total Stock */}
                                            <th 
                                                className="py-4 px-4 text-center text-slate-800 bg-slate-100/50 cursor-pointer hover:bg-slate-200/50 transition-colors w-24 group border-r border-slate-200"
                                                onClick={() => handleSort('total')}
                                            >
                                                <div className="flex items-center justify-center gap-1.5">
                                                    รวมทั้งหมด
                                                    <span className="text-slate-400 group-hover:text-slate-600">
                                                        {sortBy === 'total' ? (sortDirection === 'asc' ? <ArrowUp className="w-3.5 h-3.5 text-indigo-600" /> : <ArrowDown className="w-3.5 h-3.5 text-indigo-600" />) : <ArrowUpDown className="w-3.5 h-3.5 opacity-50" />}
                                                    </span>
                                                </div>
                                            </th>
                                            
                                            {/* Dynamic Usage View */}
                                            {usageView === 'monthly' ? (
                                                MONTH_LABELS.map((label, idx) => (
                                                    <th key={idx} className={`py-4 px-2 text-center text-teal-700 bg-teal-50/30 ${idx === 5 ? 'border-r border-slate-200' : ''}`}>
                                                        <div className="flex flex-col items-center leading-tight">
                                                            <span>{label.split(' ')[0]}</span>
                                                            <span className="text-[9px] font-normal opacity-70">{label.split(' ')[1]}</span>
                                                        </div>
                                                    </th>
                                                ))
                                            ) : (
                                                <th 
                                                    className="py-4 px-4 text-center text-teal-700 bg-teal-50/50 cursor-pointer hover:bg-teal-100/50 transition-colors border-r border-slate-200 group"
                                                    onClick={() => handleSort(usageView === 'average' ? 'avgMonthly' : 'usage6m')}
                                                >
                                                    <div className="flex items-center justify-center gap-1.5">
                                                        <BarChart3 className="w-3.5 h-3.5 opacity-70" />
                                                        {usageView === 'average' ? 'ยอดเฉลี่ย/เดือน' : 'ยอดรวม 6 เดือน'}
                                                        <span className="text-teal-400 group-hover:text-teal-600">
                                                            {(sortBy === 'usage6m' || sortBy === 'avgMonthly') ? (sortDirection === 'asc' ? <ArrowUp className="w-3.5 h-3.5" /> : <ArrowDown className="w-3.5 h-3.5" />) : <ArrowUpDown className="w-3.5 h-3.5 opacity-50" />}
                                                        </span>
                                                    </div>
                                                </th>
                                            )}

                                            {/* Lead Time */}
                                            <th className="py-4 px-3 text-center text-slate-600 border-r border-slate-200">Lead Time<br/><span className="text-[9px] font-normal opacity-70">(เดือน)</span></th>
                                            
                                            {/* Aging & Color Codes */}
                                            <th className="py-4 px-3 text-center text-slate-600 bg-slate-50/50">เฉลี่ย/ด<br/><span className="text-[9px] font-normal opacity-70">(ปกติ)</span></th>
                                            <th className="py-4 px-3 text-center text-slate-600 bg-slate-50/50">สต็อก(ด.)</th>
                                            <th 
                                                className="py-4 px-3 text-center text-slate-900 bg-slate-100/50 cursor-pointer hover:bg-slate-200/50 border-r border-slate-200 group"
                                                onClick={() => handleSort('code')}
                                            >
                                                <div className="flex items-center justify-center gap-1.5">
                                                    รหัสสี
                                                    <span className="text-slate-400 group-hover:text-slate-600">
                                                        {sortBy === 'code' ? (sortDirection === 'asc' ? <ArrowUp className="w-3.5 h-3.5 text-indigo-600" /> : <ArrowDown className="w-3.5 h-3.5 text-indigo-600" />) : <ArrowUpDown className="w-3.5 h-3.5 opacity-50" />}
                                                    </span>
                                                </div>
                                            </th>

                                            {/* Aging & Color Codes (+50%) */}
                                            <th className="py-4 px-3 text-center text-fuchsia-700 bg-fuchsia-50/30">เฉลี่ย(+50%)</th>
                                            <th className="py-4 px-3 text-center text-fuchsia-700 bg-fuchsia-50/30">สต็อก(+50%)</th>
                                            <th 
                                                className="py-4 px-3 text-center text-fuchsia-900 bg-fuchsia-100/40 cursor-pointer hover:bg-fuchsia-200/40 group"
                                                onClick={() => handleSort('code50')}
                                            >
                                                <div className="flex items-center justify-center gap-1.5">
                                                    รหัส(+50%)
                                                    <span className="text-fuchsia-400 group-hover:text-fuchsia-600">
                                                        {sortBy === 'code50' ? (sortDirection === 'asc' ? <ArrowUp className="w-3.5 h-3.5 text-fuchsia-600" /> : <ArrowDown className="w-3.5 h-3.5 text-fuchsia-600" />) : <ArrowUpDown className="w-3.5 h-3.5 opacity-50" />}
                                                    </span>
                                                </div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {processedData.length > 0 ? (
                                            processedData.map((item) => {
                                                const isLowStock = item.total > 0 && item.total < threshold;
                                                const isOutOfStock = item.total === 0;

                                                return (
                                                    <tr 
                                                        key={item.id} 
                                                        className={`group transition-colors duration-150 ${
                                                            isOutOfStock ? 'bg-red-50/30 hover:bg-red-50/70' : 
                                                            isLowStock ? 'bg-amber-50/30 hover:bg-amber-50/70' : 
                                                            'hover:bg-slate-50/80'
                                                        }`}
                                                    >
                                                        {/* Sticky No. */}
                                                        <td className={`py-3 px-3 text-center text-slate-400 font-eng text-xs sticky left-0 z-10 border-r border-slate-100/50 ${
                                                            isOutOfStock ? 'bg-red-50/80 group-hover:bg-red-50' : 
                                                            isLowStock ? 'bg-amber-50/80 group-hover:bg-amber-50' : 
                                                            'bg-white group-hover:bg-slate-50'
                                                        }`}>{item.id}</td>
                                                        
                                                        {/* Sticky Name */}
                                                        <td className={`py-3 px-4 font-semibold text-slate-700 sticky left-12 z-10 shadow-[4px_0_12px_-4px_rgba(0,0,0,0.02)] border-r border-slate-200/60 font-eng ${
                                                            isOutOfStock ? 'bg-red-50/80 group-hover:bg-red-50' : 
                                                            isLowStock ? 'bg-amber-50/80 group-hover:bg-amber-50' : 
                                                            'bg-white group-hover:bg-slate-50'
                                                        }`}>
                                                            <div className="flex items-center gap-2.5">
                                                                {item.model}
                                                                {isOutOfStock && <span className="text-[10px] font-bold bg-red-100 text-red-600 border border-red-200 px-1.5 py-0.5 rounded shadow-sm">หมด</span>}
                                                                {isLowStock && <span className="text-[10px] font-bold bg-amber-100 text-amber-700 border border-amber-200 px-1.5 py-0.5 rounded shadow-sm">ใกล้หมด</span>}
                                                            </div>
                                                        </td>
                                                        
                                                        {/* Breakdown */}
                                                        <td className="py-3 px-3 text-center text-slate-500 font-eng tabular-nums">{item.warehouse}</td>
                                                        <td className="py-3 px-3 text-center text-slate-500 font-eng tabular-nums">{item.ready}</td>
                                                        <td className="py-3 px-3 text-center text-slate-400 font-eng tabular-nums">{item.defect > 0 ? <span className="text-orange-500 font-medium">{item.defect}</span> : 0}</td>
                                                        <td className="py-3 px-3 text-center text-slate-400 font-eng tabular-nums border-r border-slate-200/60">{item.floating > 0 ? <span className="text-indigo-500 font-medium">{item.floating}</span> : 0}</td>
                                                        
                                                        {/* Total */}
                                                        <td className="py-3 px-4 text-center border-r border-slate-200/60">
                                                            <span className={`inline-flex items-center justify-center min-w-[2.5rem] py-1 px-2.5 rounded-md font-bold font-eng tabular-nums shadow-sm ${
                                                                isOutOfStock ? 'bg-red-500 text-white' :
                                                                isLowStock ? 'bg-amber-500 text-white' :
                                                                'bg-slate-800 text-white'
                                                            }`}>
                                                                {item.total}
                                                            </span>
                                                        </td>
                                                        
                                                        {/* Dynamic Usage */}
                                                        {usageView === 'monthly' ? (
                                                            item.history.map((val, idx) => (
                                                                <td key={idx} className={`py-3 px-2 text-center font-eng tabular-nums text-slate-600 bg-teal-50/10 ${idx === 5 ? 'border-r border-slate-200/60' : ''}`}>
                                                                    {val > 0 ? val : <span className="text-slate-300">-</span>}
                                                                </td>
                                                            ))
                                                        ) : (
                                                            <td className="py-3 px-4 text-center text-teal-700 font-bold font-eng tabular-nums bg-teal-50/30 border-r border-slate-200/60">
                                                                {usageView === 'average' ? item.avgMonthly.toFixed(1) : item.usage6m}
                                                            </td>
                                                        )}

                                                        {/* Lead Time */}
                                                        <td className="py-3 px-3 text-center text-slate-600 font-eng border-r border-slate-200/60 tabular-nums">{item.leadTime}</td>
                                                        
                                                        {/* Normal Scenario Data */}
                                                        <td className="py-3 px-3 text-center text-slate-500 font-eng tabular-nums bg-slate-50/30">
                                                            {item.avgMonthly > 0 ? item.avgMonthly.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="py-3 px-3 text-center text-slate-500 font-eng tabular-nums bg-slate-50/30">
                                                            {isFinite(item.aging) ? item.aging.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="py-3 px-3 text-center border-r border-slate-200/60 bg-slate-50/30">
                                                            <div className={`mx-auto inline-flex items-center justify-center min-w-[3.5rem] py-1 px-2 rounded font-bold text-xs font-eng border ${getColorCodeStyle(item.code)}`}>
                                                                {isFinite(item.code) ? item.code.toFixed(2) : '-'}
                                                            </div>
                                                        </td>

                                                        {/* +50% Scenario Data */}
                                                        <td className="py-3 px-3 text-center text-fuchsia-700/70 font-eng tabular-nums bg-fuchsia-50/20">
                                                            {item.avgMonthly50 > 0 ? item.avgMonthly50.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="py-3 px-3 text-center text-fuchsia-700/70 font-eng tabular-nums bg-fuchsia-50/20">
                                                            {isFinite(item.aging50) ? item.aging50.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="py-3 px-3 text-center bg-fuchsia-50/20">
                                                            <div className={`mx-auto inline-flex items-center justify-center min-w-[3.5rem] py-1 px-2 rounded font-bold text-xs font-eng border ${getColorCodeStyle(item.code50)}`}>
                                                                {isFinite(item.code50) ? item.code50.toFixed(2) : '-'}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        ) : (
                                            <tr>
                                                <td colSpan="20" className="p-16 text-center">
                                                    <div className="flex flex-col items-center justify-center gap-3 text-slate-400">
                                                        <div className="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mb-2">
                                                            <Search className="w-8 h-8 opacity-40" />
                                                        </div>
                                                        <p className="text-lg font-medium text-slate-500">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</p>
                                                        <p className="text-sm">ลองเปลี่ยนคำค้นหา หรือปิดตัวกรองสินค้าใกล้หมด</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                            
                            {/* Table Footer */}
                            <div className="bg-slate-50/80 border-t border-slate-200/60 p-4 px-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs font-medium text-slate-500">
                                <div className="flex items-center gap-4">
                                    <span className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-red-50 border border-red-200"></div> ต้องสั่งเพิ่ม (&lt; 0.75)</span>
                                    <span className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-amber-50 border border-amber-200"></div> เฝ้าระวัง (0.75 - 1.24)</span>
                                    <span className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-emerald-50 border border-emerald-200"></div> ปกติ (≥ 1.25)</span>
                                </div>
                                <div>
                                    แสดงข้อมูลทั้งหมด <strong className="text-slate-700">{processedData.length}</strong> จาก {INITIAL_DATA.length} รายการ
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
